<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fishtank</title>
</head>
<body>
  <div id="controls">
    <div class="ctrl-row">
      <select id="scenario-select" aria-label="Escenario"></select>
      <button id="btn-play">▶ Animar</button>
      <button id="btn-reset">⟲ Reset</button>
      <label>Semilla <input type="number" id="seed" min="0" step="1" value="42"></label>
      <label>Velocidad <input type="range" id="speed" min="1" max="60" value="20"> <output id="speed-out">20</output></label>
      <label><input type="checkbox" id="show-vision"> Cono de visión</label>
    </div>
  </div>
  <div id="main">
    <div id="stage"><canvas id="canvas"></canvas></div>
    <div id="sidebar">
      <div class="label">HUD</div>
      <div id="hud"></div>
      <div id="inspector">
        <div class="label">Inspector</div>
        <div id="inspector-body" class="muted">clic en un pez o planta para inspeccionar</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
